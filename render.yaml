services:
  - type: web
    name: continuum-constraint-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn constraint_engine:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: FLASK_ENV
        value: production
